[variables]
NIXPACKS_PHP_EXTENSIONS = "intl,zip,pdo_pgsql"

[phases.setup]
nixPkgs = ['nodejs_20', 'npm-9_x']
aptPkgs = ['libicu-dev', 'libzip-dev', 'libpq-dev']

[phases.install]
cmds = [
    'composer install --no-interaction --prefer-dist --optimize-autoloader',
    'npm ci',
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]

[start]
cmd = 'php artisan migrate --force && php -S 0.0.0.0:${PORT:-8000} -t public public/index.php'
