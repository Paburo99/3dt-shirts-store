[variables]
NIXPACKS_PHP_EXTENSIONS = "intl,zip,pdo_pgsql"

[phases.setup]
nixPkgs = ['php82', 'php82Extensions.pgsql', 'php82Extensions.pdo_pgsql', 'php82Extensions.intl', 'php82Extensions.zip', 'nodejs_20', 'npm-9_x']
aptPkgs = ['libicu-dev', 'libzip-dev', 'libpq-dev']

[phases.install]
cmds = [
    'composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-req=ext-intl --ignore-platform-req=ext-zip',
    'npm ci',
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]

[start]
cmd = 'php artisan migrate --force && php -S 0.0.0.0:${PORT:-8000} -t public public/index.php'
