[phases.setup]
nixPkgs = ['php82', 'php82Extensions.pgsql', 'php82Extensions.pdo_pgsql', 'php82Extensions.intl', 'php82Extensions.zip', 'nodejs_20', 'npm-9_x']

[phases.install]
cmds = [
    'composer install --no-interaction --prefer-dist --optimize-autoloader',
    'npm ci',
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]

[start]
cmd = 'php artisan serve --host=0.0.0.0 --port=${PORT:-8000}'
